services:
  redis:
    image: redis:7.4-alpine
    container_name: wifi-portal-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]

  platform-api:
    build:
      context: .
      dockerfile: docker/platform-api.Dockerfile
    container_name: wifi-portal-platform-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      STATE_STORE_BACKEND: redis
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  channel-web:
    build:
      context: .
      dockerfile: docker/channel-web.Dockerfile
      args:
        VITE_API_BASE_URL: http://127.0.0.1:3000/api
        VITE_WS_BASE_URL: ws://127.0.0.1:3000
    container_name: wifi-portal-channel-web
    restart: unless-stopped
    depends_on:
      platform-api:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "-",
          "http://127.0.0.1/"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  redis-data:
